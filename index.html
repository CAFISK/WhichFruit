    <div class="toggle-thumb">
      <span id="themeIcon">☀️</span>
    </div>

      <p>回答以下问题，发现你的水果人格！</p>
    </div>

    <!-- Start Screen -->
    <div class="quiz-card" id="startScreen">
      <div class="start-screen">
        <div class="fruit-icons">🍎🍊🍋🍇🍓🥝</div>
        <h2>准备好了吗？</h2>
        <p>
          每个人都有一种水果与自己的性格最为契合。<br>
          通过 16 道趣味小题，看看你最像哪种水果吧！<br>
          没有对错之分，选择最贴近你的答案即可 ✨
        </p>
        <button class="start-btn" onclick="startQuiz()">开始测试 🚀</button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quizScreen" class="hidden">
      <!-- Progress -->
      <div class="progress-container">
        <div class="progress-info">
          <span id="progressText">第 1 题 / 共 16 题</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Question Card -->
      <div class="quiz-card" id="questionCard">
        <div class="question-emoji" id="questionEmoji"></div>
        <div class="question-number" id="questionNumber"></div>
        <div class="question-text" id="questionText"></div>
        <div class="options" id="optionsContainer"></div>
        <div class="nav-buttons">
          <button class="nav-btn prev" id="prevBtn" onclick="prevQuestion()">← 上一题</button>
          <button class="nav-btn next" id="nextBtn" onclick="nextQuestion()" disabled>下一题 →</button>
        </div>
      </div>
    </div>

    <!-- Result Screen -->
    <div class="quiz-card hidden" id="resultScreen">
      <div class="result-screen">
        <div class="result-fruit-emoji" id="resultEmoji"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-subtitle" id="resultSubtitle"></div>
        <div class="result-match">
          匹配度：<span id="resultMatch"></span>
        </div>
        <div class="result-traits" id="resultTraits"></div>
        <div class="result-desc" id="resultDesc"></div>
        <div class="top3-container" id="top3Container"></div>
        <div class="result-actions">
          <button class="restart-btn" onclick="restartQuiz()">🔄 再测一次</button>
          <button class="share-btn" onclick="shareResult()">📋 复制结果</button>
        </div>
      </div>
    </div>

    <div class="footer">Made with 🍓 — Fruit Personality Quiz</div>
  </div>

    const results = {

    // ===== State =====
    let currentQuestion = 0;
    let answers = [];

    // ===== Theme =====
    function initTheme() {
      const saved = localStorage.getItem('fruitQuizTheme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
      updateThemeIcon();
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('fruitQuizTheme', next);
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const theme = document.documentElement.getAttribute('data-theme');
      document.getElementById('themeIcon').textContent = theme === 'dark' ? '🌙' : '☀️';
    }

    // ===== Quiz Logic =====
    function startQuiz() {
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('quizScreen').classList.remove('hidden');
      currentQuestion = 0;
      answers = new Array(questions.length).fill(null);
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      const card = document.getElementById('questionCard');

      // Animate
      card.style.animation = 'none';
      card.offsetHeight; // trigger reflow
      card.style.animation = 'fadeInUp 0.4s ease';

      document.getElementById('questionEmoji').textContent = q.emoji;
      document.getElementById('questionNumber').textContent = `问题 ${currentQuestion + 1}`;
      document.getElementById('questionText').textContent = q.question;

      // Progress
      const progress = ((currentQuestion) / questions.length) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
      document.getElementById('progressText').textContent = `第 ${currentQuestion + 1} 题 / 共 ${questions.length} 题`;
      document.getElementById('progressPercent').textContent = Math.round(progress) + '%';

      // Options
      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      const labels = ['A', 'B', 'C', 'D'];

      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        if (answers[currentQuestion] === i) {
          btn.classList.add('selected');
        }
        btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt.text}</span>`;
        btn.onclick = () => selectOption(i);
        container.appendChild(btn);
      });

      // Nav buttons
      document.getElementById('prevBtn').style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
      document.getElementById('nextBtn').disabled = answers[currentQuestion] === null;
      document.getElementById('nextBtn').textContent =
        currentQuestion === questions.length - 1 ? '查看结果 🎉' : '下一题 →';
    }

    function selectOption(index) {
      answers[currentQuestion] = index;
      document.querySelectorAll('.option-btn').forEach((btn, i) => {
        btn.classList.toggle('selected', i === index);
      });
      document.getElementById('nextBtn').disabled = false;
    }

    function nextQuestion() {
      if (answers[currentQuestion] === null) return;
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    }

    function calculateResult() {
      const scores = { apple: 0, peach: 0, strawberry: 0, grape: 0, orange: 0, watermelon: 0, lemon: 0, kiwi: 0 };
      answers.forEach((ansIndex, qIndex) => {
        if (ansIndex !== null) {
          const type = questions[qIndex].options[ansIndex].type;
          scores[type]++;
        }
      });

      // Sort by score descending
      const sorted = Object.entries(scores)
        .sort((a, b) => b[1] - a[1]);

      return sorted; // Returns array of [type, score] pairs
    }

    function getTopResult() {
      const sorted = calculateResult();
      return sorted[0][0]; // Return the top fruit type
    }

    function showResult() {
      document.getElementById('quizScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');

      const sorted = calculateResult();
      const topType = sorted[0][0];
      const topScore = sorted[0][1];
      const result = results[topType];
      const totalAnswered = answers.filter(a => a !== null).length;

      // Calculate match percentage based on score proportion
      const matchPercent = totalAnswered > 0 ? Math.round((topScore / totalAnswered) * 100) : 0;

      document.getElementById('resultEmoji').textContent = result.emoji;
      document.getElementById('resultTitle').textContent = `你是「${result.name}」！`;
      document.getElementById('resultSubtitle').textContent = result.subtitle;
      document.getElementById('resultMatch').textContent = matchPercent + '%';
      document.getElementById('resultDesc').textContent = result.description;

      const traitsContainer = document.getElementById('resultTraits');
      traitsContainer.innerHTML = '';
      result.traits.forEach(trait => {
        const tag = document.createElement('span');
        tag.className = 'trait-tag';
        tag.textContent = '#' + trait;
        traitsContainer.appendChild(tag);
      });

      // Top 3 ranking
      const top3Container = document.getElementById('top3Container');
      top3Container.innerHTML = '';
      const rankIcons = ['🥇', '🥈', '🥉'];
      const top3 = sorted.filter(([type, score]) => score > 0).slice(0, 3);

      if (top3.length > 0) {
        const title = document.createElement('div');
        title.className = 'top3-title';
        title.textContent = '🏆 最适配水果 TOP 3';
        top3Container.appendChild(title);

        const list = document.createElement('div');
        list.className = 'top3-list';

        top3.forEach(([type, score], index) => {
          const r = results[type];
          const percent = totalAnswered > 0 ? Math.round((score / totalAnswered) * 100) : 0;
          const item = document.createElement('div');
          item.className = 'top3-item' + (index === 0 ? ' rank-1' : '');
          item.innerHTML = `
            <span class="top3-rank">${rankIcons[index]}</span>
            <span class="top3-emoji">${r.emoji}</span>
            <div class="top3-info">
              <div class="top3-name">${r.name}</div>
              <div class="top3-sub">${r.subtitle}</div>
            </div>
            <div class="top3-bar-container">
              <div class="top3-bar" style="width: 0%" data-width="${percent}%"></div>
            </div>
            <span class="top3-percent">${percent}%</span>
          `;
          list.appendChild(item);
        });

        top3Container.appendChild(list);

        // Animate bars
        requestAnimationFrame(() => {
          setTimeout(() => {
            list.querySelectorAll('.top3-bar').forEach(bar => {
              bar.style.width = bar.dataset.width;
            });
          }, 100);
        });
      }

      // Confetti!
      launchConfetti();
    }

    function restartQuiz() {
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('startScreen').classList.remove('hidden');
      currentQuestion = 0;
      answers = [];
    }

    function shareResult() {
      const sorted = calculateResult();
      const topType = sorted[0][0];
      const topScore = sorted[0][1];
      const result = results[topType];
      const totalAnswered = answers.filter(a => a !== null).length;
      const matchPercent = totalAnswered > 0 ? Math.round((topScore / totalAnswered) * 100) : 0;

      const top3 = sorted.filter(([t, s]) => s > 0).slice(0, 3);
      const top3Text = top3.map(([t, s], i) => {
        const r = results[t];
        const p = totalAnswered > 0 ? Math.round((s / totalAnswered) * 100) : 0;
        return `${['🥇','🥈','🥉'][i]} ${r.emoji} ${r.name}（${p}%）`;
      }).join('\n');

      const text = `🍉 测测你是哪种水果\n\n我的结果是：${result.emoji} ${result.name} —— ${result.subtitle}\n匹配度：${matchPercent}%\n\n🏆 TOP 3：\n${top3Text}\n\n${result.traits.map(t => '#' + t).join(' ')}\n\n快来测测你是哪种水果吧！`;

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.querySelector('.share-btn');
          const original = btn.textContent;
          btn.textContent = '✅ 已复制！';
          setTimeout(() => { btn.textContent = original; }, 2000);
        });
      }
    }

    // ===== Confetti =====
    function launchConfetti() {
      const container = document.getElementById('confettiContainer');
      container.innerHTML = '';
      const emojis = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍑', '🥝', '🍌', '✨', '🎉'];

      for (let i = 0; i < 30; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.animationDuration = (2 + Math.random() * 3) + 's';
        confetti.style.animationDelay = Math.random() * 2 + 's';
        confetti.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        container.appendChild(confetti);
      }

      setTimeout(() => { container.innerHTML = ''; }, 6000);
    }

    // ===== Keyboard Support =====
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('quizScreen').classList.contains('hidden')) return;

      const keyMap = { '1': 0, '2': 1, '3': 2, '4': 3, 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
      const key = e.key.toLowerCase();

      if (key in keyMap) {
        selectOption(keyMap[key]);
      } else if (key === 'enter' || key === 'arrowright') {
        if (!document.getElementById('nextBtn').disabled) nextQuestion();
      } else if (key === 'arrowleft') {
        prevQuestion();
      }
    });

    // ===== Init =====
    initTheme();
  </script>
</body>
</html>
